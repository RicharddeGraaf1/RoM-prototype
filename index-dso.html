<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Omgevingsloket — Regels op maat (DSO-toolkit)</title>
<!-- Officiële DSO-toolkit 98.0.0 (vereist internet) -->
<link rel="stylesheet" href="https://cdn.dso-toolkit.nl/dso-toolkit/98.0.0/dist/dso.css">
<script type="module" src="https://cdn.dso-toolkit.nl/@dso-toolkit/core/98.0.0/dist/dso-toolkit/dso-toolkit.esm.js"></script>
<style>
  body{margin:0;font-family:Asap,sans-serif;color:#154273}
  a{color:#39870c}
  .kop{display:flex;align-items:center;gap:14px;padding:12px 22px;border-bottom:1px solid #e2e2e2;position:relative;background:#fff}
  .kop .logo{width:34px;height:34px;border-radius:50%;background:#39870c;display:flex;align-items:center;justify-content:center}
  .kop .logo::after{content:"";width:12px;height:12px;border-radius:50%;background:#154273}
  .kop b{font-size:19px;color:#39870c} .kop span{font-size:19px;color:#5b6b52;margin-left:6px}
  .ribbon{position:absolute;top:9px;right:-42px;transform:rotate(38deg);background:#e8e30a;color:#333;font-weight:700;padding:5px 46px;font-size:13px}
  .loc{display:flex;gap:26px;padding:10px 22px;border-bottom:1px solid #e2e2e2;font-size:14px;background:#f7f9f5}
  .loc label{color:#5b6b52} .loc b{color:#7a2e6b}
  .grid{display:grid;grid-template-columns:1fr 40%;min-height:calc(100vh - 116px)}
  @media(max-width:900px){.grid{grid-template-columns:1fr}.side{display:none}}
  .panel{padding:20px 24px;overflow:auto}
  h1{font-size:24px;color:#39870c;margin:0 0 12px}
  .side{border-left:1px solid #e2e2e2;position:relative;overflow:hidden;background:#eef0ec}
  .mapsvg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .geo{fill:#7a2e6b;fill-opacity:.05;stroke:#7a2e6b;stroke-opacity:.35;stroke-width:1.4;
       vector-effect:non-scaling-stroke;transition:fill-opacity .12s,stroke-opacity .12s;cursor:pointer}
  .geo.hot{fill-opacity:.28;stroke-opacity:1;stroke-width:2.4}
  .geo.dekt{fill:none!important} .geo.dekt.hot{stroke-width:3}
  .geo.perceel{fill:none;stroke:#b0392f;stroke-opacity:.9;stroke-width:2;stroke-dasharray:5 3}
  .geo.perceel.hot{stroke-width:3;stroke-dasharray:none}
  .mk{fill:#7a2e6b;stroke:#fff;stroke-width:2}
  .maplabel{position:absolute;left:10px;bottom:10px;right:10px;background:rgba(255,255,255,.92);
       border:1px solid #e2e2e2;border-radius:6px;padding:7px 10px;font-size:12px;color:#5b6b52;box-shadow:0 1px 4px rgba(0,0,0,.12)}
  .maplabel b{color:#7a2e6b}
  .art.geohot{background:#faf6fb}
  .geo-ind{color:#7a2e6b;font-size:12px;margin-left:2px;flex:0 0 auto;opacity:.75}
  .doc{border:1px solid #e2e2e2;border-radius:4px;margin-bottom:12px;background:#fff}
  .doc>.dhead{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;cursor:pointer}
  .doc .titel{font-size:17px;color:#39870c;font-weight:600}
  .doc .meta{font-size:13px;color:#5b6b52;margin:2px 0 8px}
  .chev{margin-left:auto;color:#5b6b52;transition:transform .15s} .doc.open .chev{transform:rotate(180deg)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{cursor:pointer} .chip .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .chip.actief dso-label{outline:2px solid #154273;border-radius:3px}
  .dbody{border-top:1px solid #eee;padding:4px 16px 12px;display:none} .doc.open>.dbody{display:block}
  .hoofdstuk{font-weight:600;font-size:13px;font-style:italic;color:#5b6b52;margin:14px 0 2px}
  .art{border-top:1px solid #f0f0f0}
  .art>.arow{display:flex;align-items:flex-start;gap:8px;padding:8px 0 8px 2px}
  .art .tw{cursor:pointer;display:flex;gap:8px;flex:1}
  .art .dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:0 0 auto}
  .art .atitel{font-size:14px}
  .achev{color:#5b6b52;margin-top:2px;transition:transform .15s;font-size:12px} .art.open .achev{transform:rotate(90deg)}
  .leden{display:none;padding:2px 0 8px 22px} .art.open .leden{display:block}
  .lid{display:flex;gap:8px;font-size:13.5px;line-height:1.55;margin:5px 0}
  .lid .nr{color:#5b6b52;min-width:20px;font-weight:600}
  .lid .lid-tekst{flex:1}
  .lid .beg{display:none}
  body.mode-beg .lid .jur{display:none}
  body.mode-beg .lid .beg{display:block}
  .beg-badge{display:inline-block;margin-left:6px;font-size:10.5px;color:#5b6b52;border:1px solid #e2e2e2;border-radius:9px;padding:0 6px;vertical-align:1px;white-space:nowrap}
  .beg-fallback{color:#5b6b52;font-style:italic}
  .viewtoggle{display:inline-flex;border:1px solid #e2e2e2;border-radius:7px;overflow:hidden;margin:0 0 14px}
  .viewtoggle button{border:0;background:#fff;color:#5b6b52;font-size:12px;padding:5px 13px;cursor:pointer}
  .viewtoggle button.active{background:#39870c;color:#fff}
  .legenda{margin-top:20px;font-size:12px;color:#5b6b52;border-top:1px solid #e2e2e2;padding-top:12px}
  .legenda span{display:inline-flex;align-items:center;gap:5px;margin:0 12px 6px 0}
  .legenda .dot{width:9px;height:9px;border-radius:50%}
  /* drawer */
  .drawer{position:absolute;inset:0;background:#fff;padding:20px 22px;overflow:auto;display:none}
  .drawer.open{display:block}
  .drawer .x{position:absolute;top:16px;right:18px;cursor:pointer;color:#5b6b52;font-size:20px}
  .drawer h3{color:#39870c;margin:0 0 2px} .drawer .art-sub{color:#5b6b52;font-size:13px;margin-bottom:14px}
  .kv{margin:12px 0} .kv .lbl{font-weight:600;font-size:13px;margin-bottom:5px}
  .kv .tags{display:flex;flex-wrap:wrap;gap:6px}
  .err{padding:40px;color:#b00}
</style>
</head>
<body>
<div class="kop"><div class="logo"></div><div><b>Omgevingsloket</b><span>Regels op maat</span></div><div class="ribbon">Concept · DSO-toolkit</div></div>
<div class="loc"><div><label>Locatie:</label> <b id="loc-adres">…</b></div><div><label>Weergave:</label> <b>Verkennen per onderwerp</b></div></div>
<div class="grid">
  <div class="panel">
    <h1>Regels op deze locatie</h1>
    <div class="viewtoggle" id="viewtoggle" title="Wissel tussen de juridische tekst en een begrijpelijke uitleg">
      <button class="active" data-mode="jur">Juridisch</button><button data-mode="beg">Begrijpelijk</button>
    </div>
    <div id="docs"></div>
    <div class="legenda" id="legenda"></div>
  </div>
  <div class="side">
    <svg class="mapsvg" id="mapsvg" preserveAspectRatio="xMidYMid slice">
      <image id="map-img" x="0" y="0"/><g id="geo-layer"></g><g id="marker"></g>
    </svg>
    <div class="maplabel" id="maplabel"></div>
    <div class="drawer" id="drawer"></div>
  </div>
</div>
<script src="./data/broekhem33.js"></script>
<script>
const KLEUR={},NAAM={};
const FUNCTIE_KLEUR={'functie':'#EAC63B','ruimtelijk gebruik':'#C9A227','natuur':'#6FA83C','water en watersysteem':'#2E7BC4','landschap':'#8Fae5b','erfgoed':'#7D5BA6','verkeer':'#4A4A4A','geluid':'#5CBFB0','bodem':'#8C6B3F','beperkingengebied':'#D64545','energievoorziening':'#A03A6B','defensie':'#777'};
const SVGNS="http://www.w3.org/2000/svg";
const FEAT={};
const featColor=f=>f.laag==='perceel'?'#b0392f':(FUNCTIE_KLEUR[f.type]||'#7a2e6b');
function setLabelHint(){const ml=document.getElementById('maplabel');if(ml)ml.innerHTML='<b>Kaart.</b> Beweeg over een artikel om zijn werkingsgebied te laten oplichten. Rode stippellijn = het perceel.';}
function clearHi(){document.querySelectorAll('#geo-layer .hot').forEach(p=>p.classList.remove('hot'));document.querySelectorAll('.art.geohot').forEach(a=>a.classList.remove('geohot'));setLabelHint();}
function highlight(fids){
  document.querySelectorAll('#geo-layer .hot').forEach(p=>p.classList.remove('hot'));
  const names=[];(fids||[]).forEach(id=>{const p=document.querySelector(`#geo-layer [data-id="${id}"]`);
    if(p){p.classList.add('hot');p.parentNode.appendChild(p);const f=FEAT[id];if(f)names.push(f.naam);}});
  const ml=document.getElementById('maplabel');
  if(ml)ml.innerHTML=names.length?('<b>Werkingsgebied'+(names.length>1?'en':'')+':</b> '+names.join(' · ')):
    'Voor dit artikel is geen apart werkingsgebied in beeld.';
}
function initGeo(geo){
  const svg=document.getElementById('mapsvg');if(!svg)return;
  if(!geo||!geo.features){svg.style.display='none';return;}
  svg.setAttribute('viewBox',`0 0 ${geo.size[0]} ${geo.size[1]}`);
  const img=document.getElementById('map-img');
  img.setAttribute('href',geo.afbeelding);img.setAttributeNS('http://www.w3.org/1999/xlink','href',geo.afbeelding);
  img.setAttribute('width',geo.size[0]);img.setAttribute('height',geo.size[1]);
  const layer=document.getElementById('geo-layer');
  geo.features.forEach(f=>{FEAT[f.id]=f;
    const p=document.createElementNS(SVGNS,'path');
    p.setAttribute('d',f.d);p.dataset.id=f.id;
    p.setAttribute('class','geo'+(f.laag==='perceel'?' perceel':'')+(f.dekt_beeld?' dekt':''));
    if(f.laag!=='perceel'){p.style.fill=featColor(f);p.style.stroke=featColor(f);}
    p.addEventListener('mouseenter',()=>{p.classList.add('hot');p.parentNode.appendChild(p);
      const ml=document.getElementById('maplabel');
      if(ml)ml.innerHTML=(f.laag==='perceel'?'<b>Perceel:</b> ':'<b>'+(f.type||'')+':</b> ')+f.naam;
      document.querySelectorAll('.art').forEach(a=>{if((a.dataset.geo||'').split(' ').includes(f.id))a.classList.add('geohot');});});
    p.addEventListener('mouseleave',clearHi);
    layer.appendChild(p);
  });
  const m=document.getElementById('marker');
  const c=document.createElementNS(SVGNS,'circle');
  c.setAttribute('cx',geo.punt[0]);c.setAttribute('cy',geo.punt[1]);c.setAttribute('r',8);c.setAttribute('class','mk');
  m.appendChild(c);
  setLabelHint();
}
function chip(t){
  const el=document.createElement('span');el.className='chip';
  el.innerHTML=`<dso-label compact="true"><span class="dot" style="background:${KLEUR[t.id]||'#bbb'}"></span>${NAAM[t.id]||t.id} ${t.aantal}</dso-label>`;
  el.onclick=e=>{e.stopPropagation();const doc=el.closest('.doc');const was=el.classList.contains('actief');
    doc.querySelectorAll('.chip').forEach(c=>c.classList.remove('actief'));
    if(!was){el.classList.add('actief');filter(doc,t.id);}else filter(doc,null);
    if(!doc.classList.contains('open'))doc.querySelector('.dhead').click();};
  return el;
}
function filter(doc,th){
  doc.querySelectorAll('.art').forEach(a=>a.style.display=(!th||a.dataset.thema===th)?'':'none');
  doc.querySelectorAll('.hoofdstuk').forEach(k=>{let vis=false,n=k.nextElementSibling;
    while(n&&n.classList.contains('art')){if(n.style.display!=='none')vis=true;n=n.nextElementSibling;}k.style.display=vis?'':'none';});
}
function openDrawer(a){
  const dr=document.getElementById('drawer');const k=a.kenmerken;
  const byType={};(k.functies||[]).forEach(f=>{(byType[f.type]=byType[f.type]||[]).push(f.naam);});
  const funcHtml=Object.keys(byType).length?Object.entries(byType).map(([t,ns])=>
    `<div class="kv"><div class="lbl">${t.charAt(0).toUpperCase()+t.slice(1)}</div><div class="tags">${ns.map(n=>`<dso-label>${n}</dso-label>`).join('')}</div></div>`).join('')
    :'<dso-alert status="info"><p style="margin:0">Geen gebiedsaanwijzingen geannoteerd in dit plan.</p></dso-alert>';
  const normHtml=(k.normen&&k.normen.length)?`<div class="tags">${k.normen.map(n=>`<dso-label>${n.naam}${n.waarde?': '+n.waarde:''}</dso-label>`).join('')}</div>`
    :'<dso-alert status="info"><p style="margin:0">Geen omgevingsnormen geannoteerd in dit plan.</p></dso-alert>';
  dr.innerHTML=`<span class="x" onclick="document.getElementById('drawer').classList.remove('open')">✕</span>
    <h3>Kenmerken en informatie</h3><div class="art-sub">Artikel ${a.nummer||''} ${a.opschrift||''}</div>
    <div class="kv"><div class="lbl">Type regel</div><dso-label status="info">${k.type_regel||'onbekend'}</dso-label></div>
    <div class="kv"><div class="lbl">Gebiedsaanwijzingen</div></div>${funcHtml}
    <div class="kv"><div class="lbl">Omgevingsnormen</div>${normHtml}</div>`;
  dr.classList.add('open');
}
function renderDoc(doc){
  const el=document.createElement('div');el.className='doc';
  const head=document.createElement('div');head.className='dhead';
  const chips=document.createElement('div');chips.className='chips';
  doc.themas.forEach(t=>chips.appendChild(chip(t)));
  head.innerHTML=`<dso-icon icon="document"></dso-icon><div style="flex:1">
    <div class="titel">${doc.titel||''}</div>
    <div class="meta">${doc.documenttype||''}${doc.bevoegd_gezag?' — '+doc.bevoegd_gezag:''} · ${doc.aantal_artikelen} artikelen</div></div>
    <dso-icon class="chev" icon="chevron-down"></dso-icon>`;
  head.querySelector('div').appendChild(chips);
  head.onclick=()=>el.classList.toggle('open');
  el.appendChild(head);
  const body=document.createElement('div');body.className='dbody';
  (doc.hoofdstukken||[]).forEach(h=>{
    const k=document.createElement('div');k.className='hoofdstuk';k.textContent=h.titel;body.appendChild(k);
    h.artikelen.forEach(a=>{
      const art=document.createElement('div');art.className='art';art.dataset.thema=a.thema;
      const hasGeo=a.geo_ids&&a.geo_ids.length;
      const k=a.kenmerken||{};
      const hasKenmerken=(k.functies&&k.functies.length)||(k.normen&&k.normen.length);
      if(hasGeo)art.dataset.geo=a.geo_ids.join(' ');
      const leden=a.leden.map(l=>{
        const jur=(l.tekst||'').trim(), beg=(l.begrijpelijk||'').trim();
        const begCell=beg?`<span class="beg">${beg}<span class="beg-badge">geen juridische status</span></span>`
                         :`<span class="beg beg-fallback">${jur}</span>`;
        return `<div class="lid"><span class="nr">${l.nummer||''}</span><span class="lid-tekst"><span class="jur">${jur}</span>${begCell}</span></div>`;
      }).join('');
      art.innerHTML=`<div class="arow"><span class="tw"><span class="achev">›</span>
        <span class="dot" style="background:${KLEUR[a.thema]||'#bbb'}"></span>
        <span class="atitel">Artikel ${a.nummer||''}${a.opschrift?' '+a.opschrift:''}</span>
        ${hasGeo?'<span class="geo-ind" title="Werkingsgebied op de kaart">◈</span>':''}</span>
        ${hasKenmerken?'<dso-info-button aria-label="Kenmerken"></dso-info-button>':''}</div>
        <div class="leden">${leden}</div>`;
      const tw=art.querySelector('.tw');
      tw.onclick=()=>art.classList.toggle('open');
      if(hasGeo){tw.addEventListener('mouseenter',()=>highlight(a.geo_ids));tw.addEventListener('mouseleave',clearHi);}
      const info=art.querySelector('dso-info-button');
      if(info)info.addEventListener('click',()=>openDrawer(a));
      body.appendChild(art);
    });
  });
  el.appendChild(body);
  return el;
}
(function(d){
  if(!d){document.body.insertAdjacentHTML('beforeend','<div class="err">Data niet geladen.</div>');return;}
  d.themas.forEach(t=>{KLEUR[t.id]=t.kleur;NAAM[t.id]=t.naam;});
  document.getElementById('loc-adres').textContent=d.locatie.adres;
  const host=document.getElementById('docs');d.documenten.forEach(doc=>host.appendChild(renderDoc(doc)));
  document.querySelectorAll('#viewtoggle button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#viewtoggle button').forEach(x=>x.classList.toggle('active',x===b));
    document.body.classList.toggle('mode-beg',b.dataset.mode==='beg');
  });
  initGeo(d.geo);
  document.getElementById('legenda').innerHTML='<b>Thema-legenda:</b><br>'+d.themas.map(t=>`<span><span class="dot" style="background:${t.kleur}"></span>${t.naam}</span>`).join('');
  if(new URLSearchParams(location.search).get('open')){
    const ci=d.documenten.findIndex(x=>x.hoofdstukken.some(h=>h.artikelen.some(a=>a.kenmerken.functies.length||a.kenmerken.normen.length)));
    const doc=document.querySelectorAll('.doc')[ci<0?0:ci];doc.querySelector('.dhead').click();
    const arts=[...doc.querySelectorAll('.art')];
    const flat=d.documenten[ci<0?0:ci].hoofdstukken.flatMap(h=>h.artikelen);
    const ai=flat.findIndex(a=>a.kenmerken.functies.length||a.kenmerken.normen.length);
    const target=arts[ai<0?0:ai];
    if(target){target.querySelector('.tw').click();openDrawer(flat[ai<0?0:ai]);}
  }
})(window.ROM_DATA);
</script>
</body>
</html>
